<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Trang Web Cơ Bản</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        padding: 0;
      }

      header {
        background: #333;
        color: white;
        padding: 15px;
        text-align: center;
      }

      nav {
        background: #555;
        padding: 10px;
        text-align: center;
      }

      nav a {
        color: white;
        margin: 0 10px;
        text-decoration: none;
      }

      .container {
        display: flex;
      }

      .sidebar {
        width: 25%;
        background: #f4f4f4;
        padding: 15px;
      }

      .content {
        width: 75%;
        padding: 15px;
      }

      footer {
        background: #333;
        color: white;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Trang Web Của Lâm</h1>
    </header>

    <nav>
      <a href="#">Trang chủ</a>
      <a href="#">Sản phẩm</a>
      <a href="#">Liên hệ</a>
    </nav>

    <div class="container">
      <div class="sidebar">
        <h3>Danh mục</h3>
        <ul>
          <li>Điện thoại</li>
          <li>Laptop</li>
          <li>Phụ kiện</li>
        </ul>
      </div>

      <div class="content">
        <h2>Sản phẩm nổi bật</h2>
        <p>Đây là nơi hiển thị sản phẩm.</p>
      </div>
    </div>

    <footer>
      <p>© 2026 - Website cơ bản</p>
    </footer>
  </body>
</html>
